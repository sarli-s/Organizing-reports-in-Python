
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            direction: rtl;
            margin: 20px;
        }
        h2 {
            text-align: right;
            font-size: 14px;
        }
        .meta-table {
            width: 300px;
            border-collapse: collapse;
            margin-bottom: 15px;
            margin-right: auto;
        }
        .meta-table td {
            border: 1px solid #000;
            padding: 4px 8px;
            text-align: right;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background-color: #c0c0c0;
            border: 1px solid #000;
            padding: 4px 6px;
            text-align: center;
        }
        td {
            border: 1px solid #000;
            padding: 4px 6px;
            text-align: center;
        }
        tr.shabbat, tr.holiday {
            background-color: #d3d3d3;
        }
    </style>
</head>
<body>
    <h2>כרטיס עובד לחודש</h2>
    
        <table class="meta-table">
            <tr><td>סה"כ ימי עבודה לחודש</td><td>0</td></tr>
            <tr><td>סה"כ שעות חודשיות</td><td>0.00</td></tr>
            <tr><td>מחיר לשעה</td><td>0.00 ₪</td></tr>
            <tr><td>סה"כ לתשלום</td><td>0.00 ₪</td></tr>
        </table>
    <table>
        <thead>
            <tr>
                <th>תאריך</th>
                <th>יום בשבוע</th>
                <th>שעת כניסה</th>
                <th>שעת יציאה</th>
                <th>סה"כ שעות</th>
                <th>הערות</th>
            </tr>
        </thead>
        <tbody>
            
        </tbody>
    </table>
</body>
</html>
